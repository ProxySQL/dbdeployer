run:
  timeout: 5m

linters:
  disable-all: true
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - gosec

linters-settings:
  errcheck:
    check-type-assertions: false
  gosec:
    excludes:
      - G115  # integer overflow int64->uint64 on file sizes — safe
      - G112  # Slowloris in test code only

issues:
  exclude-use-default: true
  exclude-rules:
    - linters:
        - errcheck
      text: "lock.Unlock"
