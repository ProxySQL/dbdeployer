run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gosec
  disable:
    - depguard

linters-settings:
  errcheck:
    check-type-assertions: false

issues:
  exclude-use-default: true
  max-issues-per-linter: 50
  max-same-issues: 10
