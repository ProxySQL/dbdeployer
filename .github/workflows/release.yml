name: Release

# Builds and publishes dbdeployer binaries when a version tag is pushed.
# Uses GoReleaser with the config in .goreleaser.yaml.
# Produces: linux/darwin x amd64/arm64 tarballs + checksums.txt
#
# Security note: no user-controlled inputs are used. Triggers only on
# version tags pushed by maintainers.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
